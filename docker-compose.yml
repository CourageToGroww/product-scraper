services:
  postgres:
    image: postgres:17-alpine
    container_name: scrapekit-main-db
    environment:
      POSTGRES_USER: scrapekit
      POSTGRES_PASSWORD: scrapekit
      POSTGRES_DB: scrapekit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - scrapekit-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapekit"]
      interval: 5s
      timeout: 3s
      retries: 5

  workbench:
    build:
      context: .
      dockerfile: workbench/Dockerfile
    container_name: scrapekit-workbench
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://scrapekit:scrapekit@postgres:5432/scrapekit
      PORT: "3000"
      NODE_ENV: production
    networks:
      - scrapekit-net
    depends_on:
      postgres:
        condition: service_healthy

  drizzle-studio:
    build:
      context: .
      dockerfile: workbench/Dockerfile
    container_name: scrapekit-studio
    ports:
      - "4983:4983"
    environment:
      DATABASE_URL: postgres://scrapekit:scrapekit@postgres:5432/scrapekit
    command: npx drizzle-kit studio --port 4983 --host 0.0.0.0
    networks:
      - scrapekit-net
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

networks:
  scrapekit-net:
    external: true
    name: scrapekit-net
